<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VP訂購系統</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="topbar">
    <h1>VP訂購系統</h1>
  </header>

  <!-- 商品區 -->
  <section class="product-list" id="productList"></section>

  <!-- 購物車 -->
  <div class="cart">
    <h3>購物車</h3>
    <div id="cartItems"></div>
    <button onclick="submitOrder()">送出訂單</button>
  </div>

  <!-- 客戶資料 -->
  <div class="customer">
    <input id="name" placeholder="客戶姓名">
    <input id="phone" placeholder="電話">
    <input id="address" placeholder="地址">
    <select id="shipping">
      <option value="宅配">宅配</option>
      <option value="自取">自取</option>
    </select>
  </div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
