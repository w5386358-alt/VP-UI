<style>
  :root{
    --bg:#f7fbff;
    --panel:#ffffff;
    --line:#dfe9f5;
    --text:#0f172a;
    --muted:#667085;
    --primary:#2f80ff;
    --success:#0f9d58;
    --danger:#dc2626;
    --used-bg:#fee2e2;
    --used-line:#ef4444;
    --used-text:#991b1b;
    --shadow:0 18px 50px rgba(37,99,235,.12);
    --radius:24px;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    padding:0;
    font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:linear-gradient(180deg,#fbfdff 0%,#f3f8ff 100%);
    color:var(--text);
  }

  .page{
    min-height:100vh;
    position:relative;
    overflow:hidden;
  }

  .bg-grid{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(47,128,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,128,255,.05) 1px, transparent 1px);
    background-size:28px 28px;
    mask-image:radial-gradient(circle at center, black 35%, transparent 85%);
    pointer-events:none;
  }

  .app-shell{
    width:min(1100px, calc(100% - 32px));
    margin:0 auto;
    padding:32px 0 56px;
  }

  .hero{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:18px 0 12px;
  }

  .ring-wrap{
    width:min(420px, 82vw);
    aspect-ratio:1/1;
    position:relative;
    display:grid;
    place-items:center;
  }

  .ring{
    position:absolute;
    inset:8%;
    border:10px solid rgba(47,128,255,.95);
    border-radius:50%;
    box-shadow:
      0 0 30px rgba(47,128,255,.45),
      0 0 70px rgba(47,128,255,.20),
      inset 0 0 20px rgba(47,128,255,.12);
    animation:pulse 2.8s ease-in-out infinite;
    background:radial-gradient(circle, rgba(255,255,255,.8) 0%, rgba(241,247,255,.55) 45%, rgba(241,247,255,0) 72%);
  }

  @keyframes pulse{
    0%,100%{transform:scale(1); box-shadow:0 0 30px rgba(47,128,255,.45),0 0 70px rgba(47,128,255,.20), inset 0 0 20px rgba(47,128,255,.12);}
    50%{transform:scale(1.015); box-shadow:0 0 36px rgba(47,128,255,.55),0 0 90px rgba(47,128,255,.24), inset 0 0 24px rgba(47,128,255,.16);}
  }

  .hero-content{
    position:relative;
    text-align:center;
    z-index:1;
  }

  .logo{
    font-size:56px;
    font-weight:900;
    letter-spacing:2px;
    color:#0c162d;
  }

  .logo span{
    color:var(--primary);
    text-shadow:0 0 18px rgba(47,128,255,.28);
  }

  .subtitle{
    margin-top:8px;
    font-size:22px;
    font-weight:800;
    color:#20314f;
  }

  .hint{
    margin-top:12px;
    color:var(--muted);
    font-size:15px;
  }

  .panel{
    margin-top:-8px;
    background:rgba(255,255,255,.88);
    border:1px solid rgba(255,255,255,.88);
    backdrop-filter:blur(10px);
    box-shadow:var(--shadow);
    border-radius:var(--radius);
    padding:22px;
  }

  .hidden{display:none !important}

  .panel-title{
    font-size:24px;
    font-weight:900;
    margin-bottom:14px;
  }

  .auth-grid{
    display:grid;
    grid-template-columns:1fr 1fr 140px;
    gap:12px;
    align-items:center;
  }

  .search-row{
    display:flex;
    gap:12px;
    align-items:center;
    margin-top:8px;
  }

  .user-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
  }

  .user-name{
    font-size:24px;
    font-weight:900;
  }

  .user-meta{
    margin-top:4px;
    color:var(--muted);
    font-size:14px;
  }

  input{
    width:100%;
    height:56px;
    border:1px solid var(--line);
    border-radius:18px;
    padding:0 18px;
    background:#fff;
    font-size:18px;
    outline:none;
    transition:.18s ease;
  }

  input:focus{
    border-color:rgba(47,128,255,.55);
    box-shadow:0 0 0 4px rgba(47,128,255,.12);
  }

  button{
    height:56px;
    min-width:120px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg, #2f80ff 0%, #68a7ff 100%);
    color:#fff;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 12px 24px rgba(47,128,255,.22);
  }

  .ghost-btn{
    background:#fff;
    color:#244b8f;
    border:1px solid #d6e4ff;
    box-shadow:none;
  }

  button:disabled{
    opacity:.7;
    cursor:not-allowed;
  }

  .status{
    margin-top:14px;
    font-size:15px;
    font-weight:700;
  }

  .status.muted{color:var(--muted)}
  .status.loading{color:#2563eb}
  .status.success{color:var(--success)}
  .status.error{color:var(--danger)}

  .summary{
    margin-top:18px;
  }

  .summary.hidden{
    display:none;
  }

  .summary-card{
    border:1px solid var(--line);
    background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    border-radius:20px;
    padding:18px 20px;
  }

  .summary-title{
    color:var(--muted);
    font-size:14px;
    margin-bottom:6px;
  }

  .summary-main{
    font-size:28px;
    font-weight:900;
  }

  .summary-sub{
    margin-top:8px;
    color:#344054;
  }

  .results{
    margin-top:18px;
  }

  .serial-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:12px;
  }

  .serial-chip{
    height:auto;
    min-width:0;
    border:1px solid rgba(47,128,255,.16);
    background:linear-gradient(180deg,#ffffff 0%, #f4f9ff 100%);
    border-radius:16px;
    padding:16px 14px;
    box-shadow:0 8px 18px rgba(47,128,255,.08);
    text-align:left;
    transition:.18s ease;
  }

  .serial-chip:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 22px rgba(47,128,255,.12);
  }

  .serial-chip.used{
    background:var(--used-bg);
    border:1px solid var(--used-line);
    box-shadow:0 8px 18px rgba(239,68,68,.12);
  }

  .serial-chip.copy-failed{
    border:1px solid var(--danger);
  }

  .serial-chip.used .chip-value{
    color:var(--used-text);
  }

  .chip-value{
    display:block;
    font-size:24px;
    line-height:1.2;
    font-weight:900;
    color:#0f172a;
    word-break:break-all;
  }

  @media (max-width: 768px){
    .app-shell{width:min(100% - 20px, 100%)}
    .panel{padding:16px}
    .logo{font-size:44px}
    .subtitle{font-size:20px}
    .ring{border-width:8px}
    .auth-grid{grid-template-columns:1fr}
    .search-row{flex-direction:column}
    .user-bar{flex-direction:column; align-items:flex-start}
    button, input{width:100%}
    .serial-grid{grid-template-columns:1fr}
  }
</style>
